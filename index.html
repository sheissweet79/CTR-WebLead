<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CTR Aftermarket Website 고객 문의 누적 보고서</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{--bg:#f8fafc;--card:#fff;--text:#0f172a;--sub:#64748b;--border:#e2e8f0;--accent:#e42526;--accent2:#1e40af}
.dark{--bg:#0f172a;--card:#1e293b;--text:#e2e8f0;--sub:#94a3b8;--border:#334155;--accent:#e42526;--accent2:#3b82f6}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;transition:background .3s,color .3s;min-height:100vh}
.container{max-width:1400px;margin:0 auto;padding:24px}
/* Header */
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;flex-wrap:wrap;gap:12px}
.header-left h1{font-size:1.6rem;font-weight:700;color:var(--accent)}
.header-left p{font-size:.85rem;color:var(--sub);margin-top:4px}
.header-right{display:flex;gap:10px}
.btn{padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-size:.85rem;transition:all .2s}
.btn:hover{border-color:var(--accent);color:var(--accent)}
/* Nav */
.nav{margin-bottom:20px}
.year-tabs{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.year-tab{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-size:.85rem;transition:all .2s}
.year-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.month-btns{display:flex;gap:6px;flex-wrap:wrap}
.month-btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-size:.82rem;transition:all .2s}
.month-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
/* Grid */
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px}
@media(max-width:900px){.grid3{grid-template-columns:1fr}}
/* Cards */
.card{background:var(--card);border-radius:12px;padding:20px;border:1px solid var(--border)}
.card h3{font-size:.95rem;font-weight:600;color:var(--sub);margin-bottom:14px;text-transform:uppercase;letter-spacing:.05em}
/* KPI */
.kpi-val{font-size:2.4rem;font-weight:800;color:var(--accent);line-height:1}
.kpi-label{font-size:.8rem;color:var(--sub);margin-top:4px}
.kpi-sub{font-size:.9rem;color:var(--text);margin-top:8px}
/* Type progress bars */
.type-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:.83rem}
.type-name{width:70px;color:var(--sub);flex-shrink:0}
.type-bar-wrap{flex:1;background:var(--border);border-radius:4px;height:10px;overflow:hidden}
.type-bar{height:10px;border-radius:4px;transition:width .4s}
.type-count{width:28px;text-align:right;font-weight:600;color:var(--text)}
/* Chart containers */
.chart-wrap{position:relative;height:260px}
/* Trend section */
.trend-section{margin-bottom:20px}
.trend-chart-wrap{position:relative;height:220px}
/* Region grid */
.region-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
@media(max-width:800px){.region-grid{grid-template-columns:repeat(2,1fr)}}
.region-card{background:var(--card);border-radius:10px;padding:14px;border:2px solid var(--border);cursor:pointer;transition:all .2s}
.region-card:hover,.region-card.active{border-color:var(--accent);box-shadow:0 0 0 3px rgba(228,37,38,.15)}
.region-card.active{background:rgba(228,37,38,.05)}
.region-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.72rem;font-weight:700;color:#fff;margin-bottom:6px}
.region-name{font-size:.78rem;color:var(--sub);margin-bottom:4px}
.region-cnt{font-size:1.5rem;font-weight:800;color:var(--text)}
.region-nl{font-size:.75rem;color:var(--sub);margin-top:2px}
/* Region tabs / email cards */
.region-filter-label{font-size:.85rem;color:var(--sub);margin-bottom:12px}
.email-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;margin-bottom:20px}
.email-card{background:var(--card);border-radius:10px;padding:14px;border:1px solid var(--border)}
.email-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.country-badge{padding:2px 8px;border-radius:4px;font-size:.72rem;font-weight:700;color:#fff}
.date-text{font-size:.75rem;color:var(--sub)}
.email-name{font-weight:600;font-size:.9rem;margin-bottom:4px}
.email-summary{font-size:.82rem;color:var(--sub);line-height:1.4;margin-bottom:8px}
.action-badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:.72rem;background:rgba(228,37,38,.1);color:var(--accent);border:1px solid rgba(228,37,38,.2)}
/* Table */
.table-section{margin-bottom:20px}
.table-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.82rem}
th{background:var(--card);border:1px solid var(--border);padding:8px 10px;text-align:left;font-weight:600;color:var(--sub);white-space:nowrap}
td{border:1px solid var(--border);padding:8px 10px;color:var(--text)}
tr:nth-child(even) td{background:rgba(0,0,0,.02)}
.dark tr:nth-child(even) td{background:rgba(255,255,255,.02)}
/* Footer */
footer{text-align:center;padding:20px;color:var(--sub);font-size:.8rem;border-top:1px solid var(--border);margin-top:20px}
.reset-btn{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-size:.8rem}
.reset-btn:hover{border-color:var(--accent);color:var(--accent)}
@media print{.header-right,.nav,.region-grid button{display:none}}
</style>
</head>

<div class="container">

<!-- Header -->
<div class="header">
  <div class="header-left">
    <h1>🚗 CTR Aftermarket 고객 문의 보고서</h1>

</div>

<!-- Month Navigator -->
<div class="nav">

  <div class="month-btns" id="month-btns"></div>

<div class="grid3">

      <div class="kpi-sub" id="kpi-region-sub"></div>

      <div class="kpi-sub" id="kpi-nl-sub"></div>
    </div>
    <div class="card">
      <h3>문의 유형</h3>
      <div id="type-bars"></div>
    </div>
  </div>
  <!-- Center: Bar chart -->
  <div class="card">
    <h3>지역별 문의 건수</h3>
    <div class="chart-wrap"><canvas id="bar-chart"></canvas></div>
    <p style="font-size:.75rem;color:var(--sub);margin-top:8px">* 클릭하여 지역 필터링</p>

    <div class="chart-wrap"><canvas id="donut-chart"></canvas></div>
  </div>
</div>

<!-- Trend -->
<div class="card trend-section">
  <h3>월별 문의 추이</h3>
  <div class="trend-chart-wrap"><canvas id="trend-chart"></canvas></div>
</div>

<!-- Region KPI Grid -->
<div class="region-grid" id="region-grid"></div>

<!-- Email Cards -->
<div class="card" style="margin-bottom:20px">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <h3 id="email-section-title">이메일 상세</h3>
    <button class="reset-btn" onclick="selectRegion('all')">전체 보기</button>
  </div>
  <div class="email-grid" id="email-grid"></div>
</div>

<!-- Table -->
<div class="card table-section">
  <div class="table-header">
    <h3>상세 데이터 테이블</h3>
    <button class="reset-btn" onclick="selectRegion('all')">필터 초기화</button>
  </div>
  <div class="table-wrap">
    <table id="data-table">
      <thead><tr>
        <th>수신일시</th><th>지역</th><th>국가</th><th>이름</th>
        <th>유형</th><th>뉴스레터</th><th>문의 요약</th><th>권고사항</th>
      </tr></thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
</div>

<footer>CTR Co.,Ltd. Aftermarket Division · 자동화 보고서 · 매일 08:30 KST 갱신</footer>
</div>

const REGION_COLORS={na:'#2563EB',latam:'#DC2626',eu:'#EA580C',sea:'#16A34A',af:'#7C3AED',cis:'#0891B2',ru:'#65A30D',etc:'#6B7280'};
const REGION_NAMES={na:'북미',latam:'중남미',eu:'유럽',sea:'동남아',af:'아중동',cis:'CIS',ru:'러시아',etc:'기타'};
const TYPE_COLORS={parts:'#0EA5E9',purchase:'#10B981',price:'#F59E0B',technical:'#8B5CF6',complaint:'#EF4444',empty:'#9CA3AF',other:'#6B7280'};
const TYPE_NAMES={parts:'부품 정보',purchase:'구매/주문',price:'가격/견적',technical:'기술 지원',complaint:'불만/A·S',empty:'내용 없음',other:'기타'};
const REGIONS=['na','latam','eu','sea','af','cis','ru','etc'];
const TYPES=['parts','purchase','price','technical','complaint','empty','other'];

let currentYM='',currentRegion='all';
let barChart=null,donutChart=null,trendChart=null;

function getAllYears(){
  const years=new Set();
  Object.keys(ALL_MONTHLY_DATA).forEach(k=>years.add(k.split('-')[0]));
  return [...years].sort();
}

function getMonthsForYear(year){
  return Object.keys(ALL_MONTHLY_DATA).filter(k=>k.startsWith(year)).sort();
}

function initNav(){
  const years=getAllYears();
  const yearTabs=document.getElementById('year-tabs');
  const monthBtns=document.getElementById('month-btns');
  
  const latestYM=Object.keys(ALL_MONTHLY_DATA).sort().pop();
  const latestYear=latestYM.split('-')[0];

  years.forEach(y=>{
    const btn=document.createElement('button');
    btn.className='year-tab'+(y===latestYear?' active':'');
    btn.textContent=y+'년';
    btn.onclick=()=>{
      document.querySelectorAll('.year-tab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      renderMonthBtns(y);
    };
    yearTabs.appendChild(btn);
  });
  renderMonthBtns(latestYear);
  loadMonth(latestYM);
}

function renderMonthBtns(year){
  const monthBtns=document.getElementById('month-btns');
  monthBtns.innerHTML='';
  getMonthsForYear(year).forEach(ym=>{
    const m=ym.split('-')[1];
    const btn=document.createElement('button');
    btn.className='month-btn'+(ym===currentYM?' active':'');
    btn.textContent=m+'월';
    btn.id='mbtn-'+ym;
    btn.onclick=()=>loadMonth(ym);
    monthBtns.appendChild(btn);
  });
}

function loadMonth(ym){
  currentYM=ym;
  currentRegion='all';
  document.querySelectorAll('.month-btn').forEach(b=>b.classList.remove('active'));
  const mb=document.getElementById('mbtn-'+ym);
  if(mb)mb.classList.add('active');
  
  const d=ALL_MONTHLY_DATA[ym];
  if(!d)return;
  
  updateKPIs(d,'all');
  renderTypeBars(d,'all');
  renderBarChart(d);
  renderDonutChart(d,'all');
  renderTrendChart(ym.split('-')[0]);
  renderRegionGrid(d);
  renderEmailCards(d,'all');
  renderTable(d,'all');
}

function updateKPIs(d,region){
  let total,nlY,nlLabel,nlSub,regionSub;
  if(region==='all'){
    total=d.total; nlY=d.nlY;
    regionSub='전체 지역';
    nlLabel=`동의율 ${Math.round(nlY/total*100)}%`;
    nlSub=`미동의 ${d.total-d.nlY}건`;
  } else {
    total=d.regionCounts[region]||0;
    nlY=d.regionNL[region]||0;
    regionSub=REGION_NAMES[region]+' 필터 적용 중';
    nlLabel=total>0?`동의율 ${Math.round(nlY/total*100)}%`:'데이터 없음';
    nlSub=`미동의 ${(d.regionNL_N[region]||0)}건 / 미표기 ${(d.regionNL_Blank[region]||0)}건`;
  }
  document.getElementById('kpi-total').textContent=total+'건';
  document.getElementById('kpi-month-label').textContent=d.label;
  document.getElementById('kpi-region-sub').textContent=regionSub;
  document.getElementById('kpi-nl').textContent=nlY+'건';
  document.getElementById('kpi-nl-label').textContent=nlLabel;
  document.getElementById('kpi-nl-sub').textContent=nlSub;
}

function renderTypeBars(d,region){
  const wrap=document.getElementById('type-bars');
  wrap.innerHTML='';
  let counts;
  if(region==='all') counts=d.typeCounts;
  else counts=d.regionTypeCounts[region]||{};
  const total=Object.values(counts).reduce((a,b)=>a+b,0)||1;
  TYPES.forEach(t=>{
    const c=counts[t]||0;
    if(region==='all'||c>0){
      const pct=Math.round(c/total*100);
      wrap.innerHTML+=`<div class="type-row">
        <span class="type-name">${TYPE_NAMES[t]}</span>
        <div class="type-bar-wrap"><div class="type-bar" style="width:${pct}%;background:${TYPE_COLORS[t]}"></div></div>
        <span class="type-count">${c}</span>
      </div>`;
    }
  });
}

function renderBarChart(d){
  if(barChart){barChart.destroy();barChart=null;}
  const ctx=document.getElementById('bar-chart').getContext('2d');
  barChart=new Chart(ctx,{
    type:'bar',
    data:{
      labels:REGIONS.map(r=>REGION_NAMES[r]),
      datasets:[{
        label:'문의 건수',
        data:REGIONS.map(r=>d.regionCounts[r]||0),
        backgroundColor:REGIONS.map(r=>REGION_COLORS[r]+'cc'),
        borderColor:REGIONS.map(r=>REGION_COLORS[r]),
        borderWidth:1,borderRadius:6
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{y:{beginAtZero:true,ticks:{stepSize:1},grid:{color:'rgba(128,128,128,.15)'}},x:{grid:{display:false}}},
      onClick:(e,els)=>{
        if(els.length){const r=REGIONS[els[0].index];toggleRegion(r);}
      }
    }
  });
}

function renderDonutChart(d,region){
  if(donutChart){donutChart.destroy();donutChart=null;}
  const ctx=document.getElementById('donut-chart').getContext('2d');
  let nlY,nlN,nlB,total;
  if(region==='all'){
    total=d.total; nlY=d.nlY;
    nlN=Object.values(d.regionNL_N).reduce((a,b)=>a+b,0);
    nlB=total-nlY-nlN;
  } else {
    nlY=d.regionNL[region]||0;
    nlN=d.regionNL_N[region]||0;
    nlB=d.regionNL_Blank[region]||0;
    total=nlY+nlN+nlB;
  }
  donutChart=new Chart(ctx,{
    type:'doughnut',
    data:{
      labels:['동의(Y)','미동의(N)','미표기'],
      datasets:[{data:[nlY,nlN,nlB],backgroundColor:['#10B981','#EF4444','#9CA3AF'],borderWidth:2}]
    },
    options:{responsive:true,maintainAspectRatio:false,cutout:'65%',
      plugins:{legend:{position:'bottom',labels:{font:{size:11}}}}
    }
  });
}

function renderTrendChart(year){
  if(trendChart){trendChart.destroy();trendChart=null;}
  const months=getMonthsForYear(year);
  const ctx=document.getElementById('trend-chart').getContext('2d');
  const colors=months.map(m=>m===currentYM?'#e42526':'#3b82f6');
  const ptSizes=months.map(m=>m===currentYM?8:4);
  trendChart=new Chart(ctx,{
    type:'line',
    data:{
      labels:months.map(m=>m.split('-')[1]+'월'),
      datasets:[{
        label:'월별 문의',
        data:months.map(m=>ALL_MONTHLY_DATA[m]?.total||0),
        borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,.1)',
        fill:true,tension:.3,
        pointBackgroundColor:colors,pointRadius:ptSizes,pointHoverRadius:8
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{y:{beginAtZero:true,ticks:{stepSize:1},grid:{color:'rgba(128,128,128,.15)'}},x:{grid:{display:false}}},
      onClick:(e,els)=>{if(els.length)loadMonth(months[els[0].index]);}
    }
  });
}

function renderRegionGrid(d){
  const grid=document.getElementById('region-grid');
  grid.innerHTML='';
  REGIONS.forEach(r=>{
    const cnt=d.regionCounts[r]||0;
    const nlY=d.regionNL[r]||0;
    const div=document.createElement('div');
    div.className='region-card'+(currentRegion===r?' active':'');
    div.id='rgcard-'+r;
    div.onclick=()=>toggleRegion(r);
    div.innerHTML=`<span class="region-badge" style="background:${REGION_COLORS[r]}">${r.toUpperCase()}</span>
      <div class="region-name">${REGION_NAMES[r]}</div>
      <div class="region-cnt">${cnt}<span style="font-size:.9rem;font-weight:400">건</span></div>
      <div class="region-nl">뉴스레터 동의 ${nlY}건</div>`;
    grid.appendChild(div);
  });
}

function toggleRegion(r){
  if(currentRegion===r) selectRegion('all');
  else selectRegion(r);
}

function selectRegion(r){
  currentRegion=r;
  const d=ALL_MONTHLY_DATA[currentYM];
  if(!d)return;
  document.querySelectorAll('.region-card').forEach(c=>c.classList.remove('active'));
  if(r!=='all'){
    const el=document.getElementById('rgcard-'+r);
    if(el)el.classList.add('active');
  }
  updateKPIs(d,r);
  renderTypeBars(d,r);
  renderDonutChart(d,r);
  renderEmailCards(d,r);
  renderTable(d,r);
}

function renderEmailCards(d,region){
  const grid=document.getElementById('email-grid');
  const title=document.getElementById('email-section-title');
  grid.innerHTML='';
  const emails=region==='all'?[...d.emails]:[...d.emails].filter(e=>e.region===region);
  emails.sort((a,b)=>b.datetime.localeCompare(a.datetime));
  title.textContent=(region==='all'?'전체 이메일':REGION_NAMES[region]+' 이메일')+` (${emails.length}건)`;
  emails.forEach(e=>{
    const div=document.createElement('div');
    div.className='email-card';
    div.innerHTML=`<div class="email-card-header">
      <span class="country-badge" style="background:${REGION_COLORS[e.region]}">${e.country}</span>
      <span class="date-text">${e.datetime}</span>
    </div>
    <div class="email-name">${e.name}</div>
    <div class="email-summary">${e.summary}</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
      <span style="padding:2px 7px;border-radius:4px;font-size:.72rem;background:${TYPE_COLORS[e.type]}22;color:${TYPE_COLORS[e.type]};border:1px solid ${TYPE_COLORS[e.type]}44">${TYPE_NAMES[e.type]}</span>
      <span style="padding:2px 7px;border-radius:4px;font-size:.72rem;background:${e.newsletter==='Y'?'#10B98122':'#9CA3AF22'};color:${e.newsletter==='Y'?'#10B981':'#9CA3AF'};border:1px solid ${e.newsletter==='Y'?'#10B98144':'#9CA3AF44'}">NL ${e.newsletter}</span>
      <span class="action-badge">${e.action}</span>
    </div>`;
    grid.appendChild(div);
  });
}

function renderTable(d,region){
  const tbody=document.getElementById('table-body');
  tbody.innerHTML='';
  const emails=region==='all'?[...d.emails]:[...d.emails].filter(e=>e.region===region);
  emails.sort((a,b)=>b.datetime.localeCompare(a.datetime));
  emails.forEach(e=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${e.datetime}</td>
      <td><span style="padding:2px 7px;border-radius:4px;font-size:.75rem;background:${REGION_COLORS[e.region]};color:#fff">${REGION_NAMES[e.region]}</span></td>
      <td>${e.country}</td><td>${e.name}</td>
      <td><span style="color:${TYPE_COLORS[e.type]}">${TYPE_NAMES[e.type]}</span></td>
      <td style="color:${e.newsletter==='Y'?'#10B981':'#9CA3AF'}">${e.newsletter}</td>
      <td>${e.summary}</td>
      <td><span style="font-size:.78rem;color:var(--accent)">${e.action}</span></td>`;
    tbody.appendChild(tr);
  });
}

function toggleDark(){
  document.body.classList.toggle('dark');
  const isDark=document.body.classList.contains('dark');
  document.querySelector('.btn').textContent=isDark?'☀️ 라이트모드':'🌙 다크모드';
}

// Init
initNav();
</script>
</body>
</html>
